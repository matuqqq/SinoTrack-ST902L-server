services:

  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sinotrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     sinotrack
      POSTGRES_PASSWORD: sinotrack_pass
      POSTGRES_DB:       sinotrack
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sinotrack -d sinotrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── App (TCP + HTTP + Dashboard) ─────────────────────────
  app:
    build: .
    container_name: sinotrack-app
    restart: unless-stopped
    env_file: .env                   # carga todas las vars de .env
    environment:
      # Override DATABASE_URL para apuntar al container de DB
      DATABASE_URL: postgresql://sinotrack:sinotrack_pass@db:5432/sinotrack?schema=public
    ports:
      - "5013:5013"                  # TCP — rastreadores GPS
      - "3000:3000"                  # HTTP — dashboard + API
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pgdata:
    driver: local
